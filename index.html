<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden White | Premium Face Wash</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =========================
GOLDEN WHITE - LIGHT PREMIUM THEME (UPGRADED)
========================= */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

:root{
  --gold:#c9a227;
  --bg:#f7f7f7;
  --surface:#ffffff;
  --text:#1a1a1a;
  --muted:#666;
  --border:rgba(0,0,0,.08);
  --shadow:0 10px 30px rgba(0,0,0,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}

.nav-container{
  max-width:1200px;
  margin:auto;
  padding:18px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo span{
  font-size:42px;
  font-weight:800;
  color:var(--gold);
}

.logo small{
  font-size:11px;
  color:var(--muted);
}

/* ================= SIDEBAR ================= */

.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:240px;
  height:100vh;
  background:#fff;
  border-right:1px solid var(--border);
  padding:20px;
  transition:.3s;
  z-index:1001;
}

.sidebar.active{
  left:0;
}

/* CLOSE BUTTON */
.close-sidebar{
  position:absolute;
  top:10px;
  right:10px;
  width:30px;
  height:30px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:700;
  background:#f1f1f1;
}

/* OVERLAY */
.sidebar-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  z-index:1000;
}

/* SIDEBAR BUTTONS */
.sidebar h3{
  color:var(--gold);
  margin-bottom:15px;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

/* HERO */
.hero{
  min-height:60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:120px 20px 40px;
  background:linear-gradient(180deg,#fff,#f2f2f2);
}

.hero h1{
  font-size:70px;
  color:var(--gold);
}

.hero h2{
  font-size:28px;
  margin-top:10px;
}

.hero p{
  max-width:700px;
  margin:20px auto;
  color:var(--muted);
}

/* GOLD BANNER */
.gold-banner{
  margin:20px auto;
  padding:40px 20px;
  background:linear-gradient(135deg,#c9a227,#f5d76e);
  color:#fff;
  text-align:center;
  border-radius:16px;
  font-weight:700;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:10px;
  padding:14px 34px;
  background:var(--gold);
  color:#fff;
  border:none;
  border-radius:50px;
  cursor:pointer;
  font-weight:700;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.product-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.product-card:hover{
  transform:translateY(-5px);
}

.product-card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.product-info{
  padding:15px;
}

.price{
  color:var(--gold);
  font-weight:800;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:450px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  background:#25D366;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:50%;
  color:#fff;
  font-size:28px;
}

</style>
</head>

<body>

<!-- OVERLAY -->
<div class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <button class="close-sidebar" onclick="closeSidebar()">✕</button>

  <h3>Categories</h3>

  <button class="btn" onclick="showCategory('facewash'); closeSidebar()">Face Wash</button>
  <button class="btn" onclick="showCategory('lotions'); closeSidebar()">Lotions</button>
  <button class="btn" onclick="showCategory('shampoo'); closeSidebar()">Shampoo</button>
  <button class="btn" onclick="showCategory('soaps'); closeSidebar()">Soaps</button>
  <button class="btn" onclick="showCategory('creams'); closeSidebar()">Creams</button>

</div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-container">
    <div class="logo">
      <span>GW</span>
      <small>Golden White</small>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Golden White</h1>
    <h2>Reveal Your Natural Glow</h2>
    <p>Premium skincare for deep cleansing and glow.</p>

    <div class="gold-banner">
      Golden White Premium Skincare — Glow Naturally
    </div>

  </div>
</section>

<!-- PRODUCTS -->
<section class="section">
  <h2 class="section-title">Products</h2>
  <div id="productGrid" class="products"></div>
</section>

</div>

<!-- MODAL -->
<div class="modal" id="orderModal">
  <div class="modal-content">
    <h3>Order</h3>
    <input id="product" readonly>
    <input placeholder="Name">
    <input placeholder="Phone">
    <textarea placeholder="Address"></textarea>
    <button class="btn" onclick="alert('Order Sent!')">Submit</button>
  </div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/923444318078">💬</a>

<script>

/* SIDEBAR CONTROL */
function openSidebar(){
  document.getElementById("sidebar").classList.add("active");
  document.querySelector(".sidebar-overlay").style.display="block";
}

function closeSidebar(){
  document.getElementById("sidebar").classList.remove("active");
  document.querySelector(".sidebar-overlay").style.display="none";
}

/* PRODUCTS */
const products = {
  facewash:[
    {name:"Charcoal Face Wash",price:799,img:"https://via.placeholder.com/400"},
    {name:"Rice Face Wash",price:799,img:"https://via.placeholder.com/400"}
  ],
  lotions:[
    {name:"Whitening Lotion",price:999,img:"https://via.placeholder.com/400"}
  ],
  shampoo:[
    {name:"Herbal Shampoo",price:699,img:"https://via.placeholder.com/400"}
  ],
  soaps:[
    {name:"Glow Soap",price:299,img:"https://via.placeholder.com/400"}
  ],
  creams:[
    {name:"Face Cream",price:899,img:"https://via.placeholder.com/400"}
  ]
};

function showCategory(cat){
  let grid=document.getElementById("productGrid");
  grid.innerHTML="";

  products[cat].forEach(p=>{
    grid.innerHTML+=`
      <div class="product-card" onclick='openOrder("${p.name}")'>
        <img src="${p.img}">
        <div class="product-info">
          <h3>${p.name}</h3>
          <p class="price">Rs ${p.price}</p>
        </div>
      </div>
    `;
  });
}

function openOrder(product){
  document.getElementById("orderModal").style.display="flex";
  document.getElementById("product").value=product;
}

showCategory('facewash');

</script>

</body>
</html>
