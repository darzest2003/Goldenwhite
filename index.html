<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden White | Premium Skincare</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =========================
GOLDEN WHITE - PREMIUM FIXED UI
========================= */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

:root{
  --gold:#c9a227;
  --bg:#f7f7f7;
  --text:#1a1a1a;
  --muted:#666;
  --border:rgba(0,0,0,.08);
  --shadow:0 10px 30px rgba(0,0,0,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ================= NAVBAR ================= */

.navbar{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  background:#fff;
  border-bottom:1px solid var(--border);
}

.nav-container{
  max-width:1200px;
  margin:auto;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* HAMBURGER */
.menu-btn{
  font-size:26px;
  cursor:pointer;
  color:var(--text);
}

/* LOGO */
.logo span{
  font-size:34px;
  font-weight:800;
  color:var(--gold);
}

.logo small{
  font-size:11px;
  color:var(--muted);
}

/* ================= SIDEBAR ================= */

.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:260px;
  height:100%;
  background:#fff;
  border-right:1px solid var(--border);
  padding:20px;
  z-index:2000;
  transition:.3s;
}

.sidebar.active{
  left:0;
}

/* CLOSE BUTTON */
.close-btn{
  position:absolute;
  top:10px;
  right:10px;
  font-size:18px;
  border:none;
  background:#f1f1f1;
  width:32px;
  height:32px;
  border-radius:6px;
  cursor:pointer;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  z-index:1500;
}

/* SIDEBAR BUTTONS */
.sidebar h3{
  color:var(--gold);
  margin:10px 0 20px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:#f2f2f2;
  cursor:pointer;
  font-weight:600;
}

.sidebar button:hover{
  background:var(--gold);
  color:#fff;
}

/* ================= HERO ================= */

.hero{
  min-height:60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:120px 20px 40px;
  background:linear-gradient(135deg,#fff,#f5f5f5);
}

.hero h1{
  font-size:60px;
  color:var(--gold);
}

.hero p{
  color:var(--muted);
  margin-top:10px;
}

/* GOLD BANNER */
.banner{
  margin-top:20px;
  padding:18px;
  background:linear-gradient(135deg,#c9a227,#f5d76e);
  color:#000;
  font-weight:700;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(201,162,39,.3);
}

/* ================= PRODUCTS ================= */

.section{
  padding:40px 20px;
}

.section-title{
  font-size:28px;
  margin-bottom:20px;
  color:var(--gold);
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.product-card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--border);
  cursor:pointer;
  transition:.3s;
}

.product-card:hover{
  transform:translateY(-6px);
}

.product-card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.product-info{
  padding:12px;
}

.price{
  color:var(--gold);
  font-weight:800;
}

/* ================= MODAL ================= */

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:#fff;
  padding:20px;
  border-radius:14px;
  width:90%;
  max-width:420px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

/* ================= WHATSAPP ================= */

.whatsapp{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  background:#25D366;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  font-size:26px;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){
  .hero h1{font-size:40px;}
}

</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">✕</button>
  <h3>Categories</h3>

  <button onclick="showCategory('facewash');closeSidebar()">Face Wash</button>
  <button onclick="showCategory('lotions');closeSidebar()">Lotions</button>
  <button onclick="showCategory('shampoo');closeSidebar()">Shampoo</button>
  <button onclick="showCategory('soaps');closeSidebar()">Soaps</button>
  <button onclick="showCategory('creams');closeSidebar()">Creams</button>
</div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-container">
    <div class="menu-btn" onclick="openSidebar()">☰</div>
    <div class="logo">
      <span>GW</span>
      <small>Golden White</small>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Golden White</h1>
    <p>Luxury skincare for glow & confidence</p>

    <div class="banner">
      ✨ Premium Black • Gold • White Skincare Collection ✨
    </div>
  </div>
</section>

<!-- PRODUCTS -->
<section class="section">
  <h2 class="section-title">Products</h2>
  <div class="products" id="productGrid"></div>
</section>

<!-- MODAL -->
<div class="modal" id="orderModal">
  <div class="modal-content">
    <h3>Order Product</h3>
    <input id="product" readonly>
    <input placeholder="Name">
    <input placeholder="Phone">
    <textarea placeholder="Address"></textarea>
    <button onclick="alert('Order Sent!')" class="banner" style="width:100%;border:none;">Submit Order</button>
  </div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/923444318078">💬</a>

<script>

const products = {
  facewash:[
    {name:"Charcoal Face Wash",price:799,img:"https://via.placeholder.com/400"},
    {name:"Rice Face Wash",price:799,img:"https://via.placeholder.com/400"}
  ],
  lotions:[{name:"Whitening Lotion",price:999,img:"https://via.placeholder.com/400"}],
  shampoo:[{name:"Herbal Shampoo",price:699,img:"https://via.placeholder.com/400"}],
  soaps:[{name:"Glow Soap",price:299,img:"https://via.placeholder.com/400"}],
  creams:[{name:"Face Cream",price:899,img:"https://via.placeholder.com/400"}]
};

function showCategory(cat){
  let grid=document.getElementById("productGrid");
  grid.innerHTML="";
  products[cat].forEach(p=>{
    grid.innerHTML+=`
      <div class="product-card" onclick="openOrder('${p.name}')">
        <img src="${p.img}">
        <div class="product-info">
          <h3>${p.name}</h3>
          <div class="price">Rs ${p.price}</div>
        </div>
      </div>
    `;
  });
}

function openSidebar(){
  document.getElementById("sidebar").style.left="0";
  document.querySelector(".overlay").style.display="block";
}

function closeSidebar(){
  document.getElementById("sidebar").style.left="-280px";
  document.querySelector(".overlay").style.display="none";
}

function openOrder(name){
  document.getElementById("orderModal").style.display="flex";
  document.getElementById("product").value=name;
}

showCategory('facewash');

</script>

</body>
</html>
